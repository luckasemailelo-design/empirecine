<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EmpireCine</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="icon" type="img/png" href="/static/uploads/Logo-empire-SIMPLIFICADA.png">
    <style>
        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ===== BODY DESKTOP ===== */
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;

            background:
                linear-gradient(rgba(0, 0, 0, 0.15),
                    rgba(0, 0, 0, 0.35)),
                url('/static/uploads/Logo-empire-FUNDO.jpg') center center / cover no-repeat;

            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        /* ===== CONTAINER ===== */
        .auth-container {
            width: 100%;
            max-width: 420px;
        }

        /* ===== CARD ===== */
        .auth-card {
            background-color: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            padding: 2.5rem 2rem;
            border-radius: 16px;
            border: 1px solid rgba(229, 9, 20, 0.35);

            /* Box-shadow animado */
            box-shadow:
                0 0 20px rgba(229, 9, 20, 0.35),
                0 0 40px rgba(229, 9, 20, 0.15);

            animation: shadowPulse 4s ease-in-out infinite;
        }

        /* ANIMAÇÃO SUAVE */
        @keyframes shadowPulse {

            0%,
            100% {
                box-shadow:
                    0 0 20px rgba(229, 9, 20, 0.35),
                    0 0 40px rgba(229, 9, 20, 0.15);
            }

            50% {
                box-shadow:
                    0 0 30px rgba(229, 9, 20, 0.55),
                    0 0 60px rgba(229, 9, 20, 0.25);
            }
        }

        /* ===== TITULOS ===== */
        .auth-card h1 {
            text-align: center;
            margin-bottom: 0.5rem;
            font-size: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.1rem;
        }

        .empire {
            color: #ff0000;
            display: flex;
            align-items: center;
            gap: 0;
        }

        .cine {
            color: #ffffff;
        }

        .imgp {
            width: 2.3rem;
            height: 2.3rem;
            margin-bottom: 10px;
        }

        .auth-card h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 1.2rem;
            font-weight: 400;
        }

        /* ===== FORM ===== */
        .auth-form .form-group {
            margin-bottom: 1.25rem;
        }

        .auth-form label {
            display: block;
            margin-bottom: 0.4rem;
            color: #ddd;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .auth-form input {
            width: 100%;
            padding: 0.9rem 1rem;
            border-radius: 8px;
            background-color: #00000000;
            color: #fff;
            border: 1px solid #444;
            transition: 0.2s;
            font-size: 1rem;
        }

        .auth-form input:focus {
            outline: none;
            border-color: #9f0303;
            background-color: #ea080816;
            box-shadow: 0 0 0 3px rgba(229, 9, 20, 0.2);
        }

        .auth-form .btn {
            width: 100%;
            padding: 0.9rem;
            margin-top: 1rem;
            background: #e50914;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .auth-form .btn:hover {
            background: #ff0f1f;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(229, 9, 20, 0.4);
        }

        /* ===== ALERTA ===== */
        .alert {
            padding: 0.9rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .alert.error {
            background-color: rgba(229, 9, 20, 0.2);
            border: 1px solid #e50914;
            color: #ff6b6b;
        }

        .login {
            font-style: oblique;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            
        }

        /* ===================================================
   📱 MOBILE — REMOVE IMAGEM E USA GRADIENTE
=================================================== */
        @media (max-width: 768px) {
            body {
                background: linear-gradient(180deg,
                        #000000,
                        #000000,
                        #000000);
                min-height: 100dvh;
                /* corrige bug de altura no mobile */
            }
        }

        @media (max-width: 768px) {
            .auth-card {
                background-color: rgba(0, 0, 0, 0.9);
                backdrop-filter: none;
                /* remove blur no mobile */
            }
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 2rem 1.5rem;
            }

            .auth-card h1 {
                font-size: 1.7rem;
            }

            .auth-card h2 {
                font-size: 1rem;
            }

            .imgp {
                width: 2rem;
                height: 2rem;
            }
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>
                <span class="empire">
                    <img src="/static/uploads/bobina.png" alt="icone" class="imgp">EMPIRE</span>
                <span class="cine">CINE</span>
            </h1>
            <h2 class="login">LOGIN</h2>
            {% if erro %}
            <div class="alert error">{{ erro }}</div>
            {% endif %}
            <form method="POST" class="auth-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="seu@email.com">
                </div>
                <div class="form-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn">Entrar</button>
            </form>
        </div>
    </div>
</body>

</html>
