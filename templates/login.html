<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EmpireCine</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="icon" type="img/png" href="/static/uploads/Logo-empire-SIMPLIFICADA.png">
    <style>
        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background:
                linear-gradient(rgba(0, 0, 0, 0.15), rgba(0, 0, 0, 0.35)),
                url('/static/uploads/Logo-empire-FUNDO.jpg') center center / cover no-repeat;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        /* ===== WRAPPER (card + loading) ===== */
        .auth-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            /* 🔴 FIX PRINCIPAL */
        }

        /* ===== CONTAINER ===== */
        .auth-container {
            width: 100%;
            max-width: 420px;
        }

        /* ===== CARD ===== */
        .auth-card {
            background-color: rgba(0, 0, 0, 0.95);
            padding: 2.5rem 2rem;
            border-radius: 16px;
            border: 1px solid rgba(229, 9, 20, 0.35);
            box-shadow:
                0 0 20px rgba(229, 9, 20, 0.35),
                0 0 40px rgba(229, 9, 20, 0.15);
            animation: shadowPulse 4s ease-in-out infinite;
        }

        @keyframes shadowPulse {

            0%,
            100% {
                box-shadow:
                    0 0 20px rgba(229, 9, 20, 0.35),
                    0 0 40px rgba(229, 9, 20, 0.15);
            }

            50% {
                box-shadow:
                    0 0 30px rgba(229, 9, 20, 0.55),
                    0 0 60px rgba(229, 9, 20, 0.25);
            }
        }

        /* ===== TITULOS ===== */
        .auth-card h1 {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.1rem;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .empire {
            color: #ff0000;
            display: flex;
            align-items: center;
        }

        .cine {
            color: #fff;
        }

        .imgp {
            width: 2.3rem;
            height: 2.3rem;
            margin-right: 0.2rem;
        }

        .login {
            text-align: center;
            font-style: oblique;
            margin-bottom: 1.5rem;
        }

        /* ===== FORM ===== */
        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            margin-bottom: 0.4rem;
            color: #ddd;
        }

        input {
            width: 100%;
            padding: 0.9rem;
            border-radius: 8px;
            background: transparent;
            border: 1px solid #444;
            color: #fff;
        }

        input:focus {
            outline: none;
            border-color: #9f0303;
            background-color: #ea080816;
        }

        .btn {
            width: 100%;
            padding: 0.9rem;
            background: #e50914;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
        }

        /* ===== LOADING (Uiverse) ===== */
        .loading {
            margin-top: 1.5rem;
            opacity: 0.8;
        }

        .loading svg polyline {
            fill: none;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .loading svg polyline#back {
            stroke: #ff4d5033;
        }

        .loading svg polyline#front {
            stroke: #ff4d4f;
            stroke-dasharray: 48, 144;
            stroke-dashoffset: 192;
            animation: dash 1.4s linear infinite;
        }

        @keyframes dash {
            to {
                stroke-dashoffset: 0;
            }
        }

        /* ===== ESCONDE LOADING NO DESKTOP ===== */
        .mobile-only {
            display: none;
        }

        /* ===== MOBILE ===== */
        @media (max-width: 768px) {
            body {
                background: #000;
            }

            .mobile-only {
                display: block;
            }
        }

        @media (max-width: 768px) {
            .auth-wrapper {
                max-width: 350px;
                /* 🔴 estreita só no mobile */
            }

            .auth-container {
                max-width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-container">
            <div class="auth-card">
                <h1>
                    <span class="empire">
                        <img src="/static/uploads/bobina.png" alt="icone" class="imgp">EMPIRE</span>
                    <span class="cine">CINE</span>
                </h1>
                <h2 class="login">LOGIN</h2>
                {% if erro %}
                <div class="alert error">{{ erro }}</div>
                {% endif %}
                <form method="POST" class="auth-form">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required placeholder="seu@email.com">
                    </div>
                    <div class="form-group">
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" name="senha" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn">Entrar</button>
                </form>
            </div>
        </div>
        <!-- From Uiverse.io by milley69 -->
        <div class="loading">
            <svg width="64px" height="48px">
                <polyline points="0.157 23.954, 14 23.954, 21.843 48, 43 0, 50 24, 64 24" id="back"></polyline>
                <polyline points="0.157 23.954, 14 23.954, 21.843 48, 43 0, 50 24, 64 24" id="front"></polyline>
            </svg>
        </div>
    </div>

</body>

</html>
