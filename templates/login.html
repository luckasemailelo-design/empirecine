<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EmpireCine</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="icon" type="img/png" href="/static/uploads/Logo-empire-SIMPLIFICADA.png">
    <style>
        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background:
                linear-gradient(rgba(0, 0, 0, 0.15), rgba(0, 0, 0, 0.35)),
                url('/static/uploads/Logo-empire-FUNDO.jpg') center center / cover no-repeat;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        /* ===== WRAPPER (card + loading) ===== */
        .auth-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        /* ===== CONTAINER ===== */
        .auth-container {
            width: 100%;
            max-width: 420px;
        }

        /* ===== CARD ===== */
        .auth-card {
            background-color: rgba(0, 0, 0, 0.95);
            padding: 2.5rem 2rem;
            border-radius: 16px;
            border: 1px solid rgba(229, 9, 20, 0.35);
            box-shadow:
                0 0 20px rgba(229, 9, 20, 0.35),
                0 0 40px rgba(229, 9, 20, 0.15);
            animation: shadowPulse 4s ease-in-out infinite;
        }

        @keyframes shadowPulse {

            0%,
            100% {
                box-shadow:
                    0 0 20px rgba(229, 9, 20, 0.35),
                    0 0 40px rgba(229, 9, 20, 0.15);
            }

            50% {
                box-shadow:
                    0 0 30px rgba(229, 9, 20, 0.55),
                    0 0 60px rgba(229, 9, 20, 0.25);
            }
        }

        /* ===== TITULOS ===== */
        .auth-card h1 {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.1rem;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .empire {
            color: #ff0000;
            display: flex;
            align-items: center;
        }

        .cine {
            color: #fff;
        }

        .imgp {
            width: 2.3rem;
            height: 2.3rem;
            margin-right: 0.2rem;
            margin-bottom: 10px;
        }

        .login {
            text-align: center;
            font-style: oblique;
            margin-bottom: 1.5rem;
        }

        /* ===== FORM ===== */
        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            margin-bottom: 0.4rem;
            color: #ddd;
        }

        input {
            width: 100%;
            padding: 0.9rem;
            border-radius: 8px;
            background: transparent;
            border: 1px solid #444;
            color: #fff;
        }

        input:focus {
            outline: none;
            border-color: #9f0303;
            background-color: #ea080816;
        }

        .btn {
            width: 100%;
            padding: 0.9rem;
            background: #e50914;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #f40612;
            transform: scale(1.02);
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* ===== MODAL (POPUP) ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.2s, opacity 0.2s;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-card {
            background: #1a1a1a;
            border-radius: 12px;
            max-width: 400px;
            width: 90%;
            padding: 2rem;
            text-align: center;
            border: 1px solid #e50914;
            box-shadow: 0 0 30px rgba(229, 9, 20, 0.5);
        }

        .modal-card h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: #e50914;
        }

        .modal-card p {
            margin-bottom: 1.5rem;
            color: #ddd;
            line-height: 1.5;
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .modal-actions button {
            padding: 0.6rem 1.5rem;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .modal-actions .btn-confirm {
            background: #e50914;
            color: #fff;
        }

        .modal-actions .btn-confirm:hover {
            background: #f40612;
            transform: scale(1.05);
        }

        .modal-actions .btn-cancel {
            background: #333;
            color: #fff;
        }

        .modal-actions .btn-cancel:hover {
            background: #444;
        }

        /* ===== LOADING (Uiverse) ===== */
        .loading {
            margin-top: 1.5rem;
            opacity: 0.8;
        }

        .loading svg polyline {
            fill: none;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .loading svg polyline#back {
            stroke: #ff4d5033;
        }

        .loading svg polyline#front {
            stroke: #ff4d4f;
            stroke-dasharray: 48, 144;
            stroke-dashoffset: 192;
            animation: dash 1.4s linear infinite;
        }

        @keyframes dash {
            to {
                stroke-dashoffset: 0;
            }
        }

        /* ===== MOBILE ===== */
        @media (max-width: 768px) {
            body {
                background: #000;
            }

            .mobile-only {
                display: block;
            }

            .auth-wrapper {
                max-width: 350px;
            }

            .auth-container {
                max-width: 100%;
            }
        }

        .mobile-only {
            display: none;
        }
    </style>
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-container">
            <div class="auth-card">
                <h1>
                    <span class="empire">
                        <img src="/static/uploads/bobina.png" alt="icone" class="imgp">EMPIRE</span>
                    <span class="cine">CINE</span>
                </h1>
                <h2 class="login">LOGIN</h2>
                {% if erro %}
                <div class="alert error" style="background: #e50914; color: #fff; padding: 0.8rem; border-radius: 8px; margin-bottom: 1rem; text-align: center;">
                    {{ erro }}
                </div>
                {% endif %}
                <form id="login-form" method="POST" class="auth-form">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required placeholder="seu@email.com">
                    </div>
                    <div class="form-group">
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" name="senha" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn">Entrar</button>
                </form>
            </div>
        </div>
        <!-- From Uiverse.io by milley69 -->
        <div class="loading mobile-only">
            <svg width="64px" height="48px">
                <polyline points="0.157 23.954, 14 23.954, 21.843 48, 43 0, 50 24, 64 24" id="back"></polyline>
                <polyline points="0.157 23.954, 14 23.954, 21.843 48, 43 0, 50 24, 64 24" id="front"></polyline>
            </svg>
        </div>
    </div>

    <!-- Modal de confirmação -->
    <div id="logout-modal" class="modal-overlay">
        <div class="modal-card">
            <h3><i class="fas fa-exclamation-triangle"></i> Sessão ativa encontrada</h3>
            <p>Você já possui uma sessão ativa em outro dispositivo.<br>Deseja encerrar essa sessão e continuar o login?</p>
            <div class="modal-actions">
                <button class="btn-confirm" id="confirm-logout">Sim, encerrar e logar</button>
                <button class="btn-cancel" id="cancel-logout">Não, cancelar</button>
            </div>
        </div>
    </div>

    <script>
        // Referências
        const loginForm = document.getElementById('login-form');
        const modal = document.getElementById('logout-modal');
        const confirmBtn = document.getElementById('confirm-logout');
        const cancelBtn = document.getElementById('cancel-logout');

        let pendingSubmit = false;   // Indica se estamos aguardando confirmação
        let formData = null;         // Armazena os dados do formulário para reenvio

        // Função para verificar se o usuário já está logado (sessão ativa)
        function verificarSessaoAtiva() {
            return fetch('/api/check-session', { method: 'GET', credentials: 'same-origin' })
                .then(response => {
                    if (response.status === 200) {
                        return response.json().then(data => data.logged_in === true);
                    }
                    return false;
                })
                .catch(() => false);
        }

        // Função para realizar logout (encerrar a sessão atual)
        function realizarLogout() {
            return fetch('/logout', { method: 'GET', credentials: 'same-origin' })
                .then(() => {
                    // Após logout, esperamos um pouco e limpamos o estado local
                    return Promise.resolve();
                })
                .catch(err => console.error('Erro ao fazer logout:', err));
        }

        // Manipula o envio do formulário
        loginForm.addEventListener('submit', function(event) {
            event.preventDefault();

            // Coleta os dados do formulário
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;

            // Se já estamos aguardando confirmação, não faz nada (evita loops)
            if (pendingSubmit) return;

            // Primeiro verifica se já existe uma sessão ativa
            verificarSessaoAtiva().then(temSessao => {
                if (temSessao) {
                    // Guarda os dados para reenviar após confirmação
                    formData = { email, senha };
                    // Mostra o modal
                    modal.classList.add('active');
                    pendingSubmit = true;
                } else {
                    // Sem sessão ativa, pode submeter normalmente
                    loginForm.submit();
                }
            }).catch(() => {
                // Em caso de erro na verificação, submete normalmente
                loginForm.submit();
            });
        });

        // Confirmação: fazer logout e depois submeter o formulário novamente
        confirmBtn.addEventListener('click', function() {
            // Esconde o modal
            modal.classList.remove('active');

            // Realiza logout e depois envia o formulário novamente
            realizarLogout().then(() => {
                // Após logout, recria os campos e submete
                const emailInput = document.getElementById('email');
                const senhaInput = document.getElementById('senha');
                emailInput.value = formData.email;
                senhaInput.value = formData.senha;

                // Limpa estado
                pendingSubmit = false;
                formData = null;

                // Submete o formulário (agora sem sessão ativa)
                loginForm.submit();
            }).catch(() => {
                // Se falhar no logout, ainda tenta submeter (melhor que travar)
                pendingSubmit = false;
                loginForm.submit();
            });
        });

        // Cancelar: fecha o modal e não faz nada
        cancelBtn.addEventListener('click', function() {
            modal.classList.remove('active');
            pendingSubmit = false;
            formData = null;
        });
    </script>
</body>

</html>
