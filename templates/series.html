{% extends "base.html" %}
{% block title %}Séries{% endblock %}
{% block content %}
<div class="page-with-sidebar">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>Filtros</h2>
            <button class="sidebar-close" id="sidebar-close"><i class="fas fa-times"></i></button>
        </div>
        <div class="sidebar-search">
            <input type="text" id="search-input" class="search-input" placeholder="Buscar séries...">
            <button id="search-btn" class="search-btn">Buscar</button>
        </div>
        <div class="filter-group">
            <div class="filter-header" onclick="toggleAnoFilter(this)">
                <span>Ano</span>
                <i class="fas fa-chevron-down"></i>
            </div>
            <div class="filter-options" id="ano-filter" style="display: none;">
                <ul id="ano-list">
                    <li><a href="#" data-ano="" class="ano-link active">Todos</a></li>
                </ul>
            </div>
        </div>
        <div class="sidebar-categories">
            <h3>Categorias</h3>
            <ul id="categorias-list">
                <li><a href="#" data-categoria="todos" class="categoria-link active">Todos</a></li>
            </ul>
        </div>
    </aside>

    <main class="main-content">
        <button class="sidebar-toggle-btn" id="sidebar-toggle-btn" style="display: none;">
            <i class="fas fa-filter"></i> Filtrar
        </button>

        <!-- Container para categorias em destaque -->
        <div id="categorias-destaque-container"></div>

        <!-- Seção "Todas as séries" (sempre visível) -->
        <h2 class="section-title">Todas as séries (A-Z)</h2>
        <div class="category-grid" id="todas-series"></div>
        <div class="load-more-container">
            <button id="load-more-todos" class="btn btn-outline" style="display: none;">Carregar Mais</button>
        </div>

        <!-- Conteúdo de categoria específica (quando selecionada na sidebar) -->
        <div id="categoria-content" style="display: none;">
            <h1 class="section-title" id="categoria-titulo"></h1>
            <div class="category-grid" id="categoria-grid"></div>
            <div class="load-more-container">
                <button id="load-more-categoria" class="btn btn-outline" style="display: none;">Carregar Mais</button>
            </div>
        </div>
    </main>
</div>
{% endblock %}

{% block scripts %}
<script>
    let currentPage = 1;
    let currentCategoria = 'todos';
    let currentAno = '';

    const categoriasDestaqueContainer = document.getElementById('categorias-destaque-container');
    const todasSeries = document.getElementById('todas-series');
    const categoriaContent = document.getElementById('categoria-content');
    const categoriaTitulo = document.getElementById('categoria-titulo');
    const categoriaGrid = document.getElementById('categoria-grid');
    const loadMoreTodos = document.getElementById('load-more-todos');
    const loadMoreCategoria = document.getElementById('load-more-categoria');
    const sidebar = document.getElementById('sidebar');
    const sidebarClose = document.getElementById('sidebar-close');
    const sidebarToggle = document.getElementById('sidebar-toggle-btn');

    // Função para atualizar as setas de rolagem horizontal
    function atualizarSetas() {
        if (typeof adicionarSetasScroll === 'function') {
            setTimeout(() => {
                document.querySelectorAll('.horizontal-scroll').forEach(container => {
                    adicionarSetasScroll(container);
                });
            }, 50);
        }
    }

    window.toggleAnoFilter = function(header) {
        header.classList.toggle('active');
        const options = document.getElementById('ano-filter');
        options.style.display = options.style.display === 'none' ? 'block' : 'none';
    };

    // Carregar anos
    fetch('/api/series/anos')
        .then(res => res.json())
        .then(anos => {
            const lista = document.getElementById('ano-list');
            anos.forEach(ano => {
                const li = document.createElement('li');
                li.innerHTML = `<a href="#" data-ano="${ano}" class="ano-link">${ano}</a>`;
                lista.appendChild(li);
            });
        });

    // Carregar categorias para a sidebar
    fetch('/api/series/categorias')
        .then(res => res.json())
        .then(categorias => {
            const lista = document.getElementById('categorias-list');
            categorias.forEach(cat => {
                const li = document.createElement('li');
                li.innerHTML = `<a href="#" data-categoria="${cat}" class="categoria-link">${cat}</a>`;
                lista.appendChild(li);
            });
        });

    // Função para carregar categorias em destaque (sem agrupamento, pois o backend já retorna séries únicas)
    function carregarCategoriasDestaque() {
        fetch('/api/series/categorias-destaque')
            .then(res => res.json())
            .then(data => {
                console.log('Dados recebidos da API:', data);
                categoriasDestaqueContainer.innerHTML = '';
                data.forEach(secao => {
                    const titulo = secao.titulo;
                    const itens = secao.itens;
                    if (itens.length === 0) return;

                    console.log(`Categoria "${titulo}" recebeu ${itens.length} itens.`);

                    const secaoDiv = document.createElement('div');
                    secaoDiv.classList.add('categoria-destaque');
                    secaoDiv.innerHTML = `
                        <h2 class="section-title">${titulo}</h2>
                        <div class="horizontal-scroll" data-categoria="${titulo}"></div>
                    `;
                    categoriasDestaqueContainer.appendChild(secaoDiv);

                    const scrollContainer = secaoDiv.querySelector('.horizontal-scroll');
                    itens.forEach(item => {
                        scrollContainer.insertAdjacentHTML('beforeend', window.cardTemplate(item));
                    });

                    carregarEstadoFavoritos();
                    atualizarSetas();
                });
            })
            .catch(err => console.error('Erro ao carregar categorias destaque:', err));
    }

    // Função para carregar lista de todas as séries (A-Z)
    function carregarListaTodos(pagina) {
        let url = `/api/series/lista?pagina=${pagina}`;
        if (currentAno) url += `&ano=${currentAno}`;
        fetch(url)
            .then(res => res.json())
            .then(data => {
                if (pagina === 1) todasSeries.innerHTML = '';
                data.itens.forEach(item => todasSeries.insertAdjacentHTML('beforeend', window.cardTemplate(item)));
                carregarEstadoFavoritos();
                if (data.pagina < data.total_paginas) {
                    loadMoreTodos.style.display = 'block';
                    loadMoreTodos.dataset.page = data.pagina + 1;
                } else {
                    loadMoreTodos.style.display = 'none';
                }
            });
    }

    // Função para carregar conteúdo de uma categoria específica
    function carregarCategoria(categoria, pagina) {
        let url = `/api/series/categoria/${encodeURIComponent(categoria)}/lista?pagina=${pagina}`;
        if (currentAno) url += `&ano=${currentAno}`;
        fetch(url)
            .then(res => res.json())
            .then(data => {
                if (pagina === 1) categoriaGrid.innerHTML = '';
                data.itens.forEach(item => categoriaGrid.insertAdjacentHTML('beforeend', window.cardTemplate(item)));
                carregarEstadoFavoritos();
                if (data.pagina < data.total_paginas) {
                    loadMoreCategoria.style.display = 'block';
                    loadMoreCategoria.dataset.page = data.pagina + 1;
                } else {
                    loadMoreCategoria.style.display = 'none';
                }
            });
    }

    // Eventos de clique nos links da sidebar
    document.addEventListener('click', function(e) {
        const link = e.target.closest('.categoria-link');
        if (link) {
            e.preventDefault();
            document.querySelectorAll('.categoria-link').forEach(l => l.classList.remove('active'));
            link.classList.add('active');
            const categoria = link.dataset.categoria;
            currentCategoria = categoria;
            currentPage = 1;
            if (categoria === 'todos') {
                // Mostrar categorias destaque e todas as séries
                categoriasDestaqueContainer.style.display = 'block';
                document.querySelector('h2.section-title').style.display = 'block'; // Título "Todas as séries"
                todasSeries.style.display = 'grid';
                loadMoreTodos.style.display = 'none'; // Será mostrado conforme necessidade
                categoriaContent.style.display = 'none';
                carregarListaTodos(1);
            } else {
                // Esconder categorias destaque e mostrar apenas a categoria selecionada
                categoriasDestaqueContainer.style.display = 'none';
                document.querySelector('h2.section-title').style.display = 'none';
                todasSeries.style.display = 'none';
                loadMoreTodos.style.display = 'none';
                categoriaContent.style.display = 'block';
                categoriaTitulo.textContent = `Séries - ${categoria}`;
                carregarCategoria(categoria, 1);
            }
        }

        const anoLink = e.target.closest('.ano-link');
        if (anoLink) {
            e.preventDefault();
            document.querySelectorAll('.ano-link').forEach(l => l.classList.remove('active'));
            anoLink.classList.add('active');
            currentAno = anoLink.dataset.ano;
            currentPage = 1;
            if (currentCategoria === 'todos') {
                todasSeries.innerHTML = '';
                carregarListaTodos(1);
            } else {
                categoriaGrid.innerHTML = '';
                carregarCategoria(currentCategoria, 1);
            }
        }
    });

    // Carregar mais para "Todas as séries"
    loadMoreTodos.addEventListener('click', function() {
        carregarListaTodos(parseInt(this.dataset.page));
    });

    // Carregar mais para categoria específica
    loadMoreCategoria.addEventListener('click', function() {
        carregarCategoria(currentCategoria, parseInt(this.dataset.page));
    });

    // Controle da sidebar no mobile
    function isMobile() { return window.innerWidth <= 768; }

    function openSidebar() {
        sidebar.classList.add('open');
        sidebar.classList.remove('closed');
        sidebarToggle.style.display = 'none';
    }

    function closeSidebar() {
        sidebar.classList.remove('open');
        sidebar.classList.add('closed');
        if (isMobile()) {
            sidebarToggle.style.display = 'block';
        }
    }

    // Estado inicial
    if (isMobile()) {
        sidebar.classList.add('closed');
        sidebar.classList.remove('open');
        sidebarToggle.style.display = 'block';
    } else {
        sidebar.classList.remove('closed', 'open');
        sidebarToggle.style.display = 'none';
    }

    // Eventos
    sidebarToggle.addEventListener('click', openSidebar);
    sidebarClose.addEventListener('click', closeSidebar);

    // Fechar ao clicar em um link de categoria ou ano (apenas no mobile)
    document.querySelectorAll('.categoria-link, .ano-link').forEach(link => {
        link.addEventListener('click', function() {
            if (isMobile()) closeSidebar();
        });
    });

    // Ajustar ao redimensionar a tela
    window.addEventListener('resize', function() {
        if (window.innerWidth > 768) {
            sidebar.classList.remove('closed', 'open');
            sidebarToggle.style.display = 'none';
        } else {
            sidebar.classList.add('closed');
            sidebar.classList.remove('open');
            sidebarToggle.style.display = 'block';
        }
    });

    // Inicialização: carregar categorias destaque e todas as séries
    carregarCategoriasDestaque();
    carregarListaTodos(1);

    // Pesquisa
    window.setupSearch('search-input', 'search-btn', function(termo) {
        if (termo.trim() === '') return;
        window.location.href = `/busca?q=${encodeURIComponent(termo)}`;
    });
</script>
{% endblock %}
